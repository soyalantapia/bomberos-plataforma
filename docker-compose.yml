version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: faro-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: faro
      POSTGRES_PASSWORD: faro_dev_password
      POSTGRES_DB: faro
    ports:
      - '5432:5432'
    volumes:
      - faro-pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U faro -d faro']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: faro-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - faro-redis-data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  faro-pg-data:
  faro-redis-data:
